<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Orders — ShopWave</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="orders-page">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-brand">
      ShopWave<span class="brand-dot"></span>
    </div>
    <div class="navbar-actions">
      <button class="nav-btn" onclick="window.location.href='index.html'">← Back to Shop</button>
    </div>
  </nav>

  <div class="orders-page-layout">

    <div class="orders-header">
      <button id="backBtn" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back
      </button>
      <h2 class="orders-title">Your Orders</h2>
    </div>

    <div id="ordersWrapper">
      <!-- orders rendered by orders.js -->
    </div>

  </div>

  <script src="orders.js"></script>
</body>
</html>
